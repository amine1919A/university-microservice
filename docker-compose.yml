name: university-platform

services:
  # ========== MySQL (shared for dev) ==========
  mysql:
    image: mysql:8.0
    shm_size: 128m
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ========== Auth Service ==========
  auth-service:
    build: ./services/auth-service
    environment:
      DB_NAME: auth_db
      DB_USER: auth_user
      DB_PASSWORD: auth_password
      DB_HOST: mysql
      DB_PORT: 3306
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-dev-key}
      JWT_ACCESS_TOKEN_LIFETIME: ${JWT_ACCESS_TOKEN_LIFETIME:-15}
      JWT_REFRESH_TOKEN_LIFETIME: ${JWT_REFRESH_TOKEN_LIFETIME:-7}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8101:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend

  # ========== User Service ==========
  user-service:
    build: ./services/user-service
    environment:
      DB_NAME: user_db
      DB_USER: user_user
      DB_PASSWORD: user_password
      DB_HOST: mysql
      DB_PORT: 3306
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      AUTH_SERVICE_URL: http://auth-service:8000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8102:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend

  # ========== Class Service ==========
  class-service:
    build: ./services/class-service
    environment:
      DB_NAME: class_db
      DB_USER: class_user
      DB_PASSWORD: class_password
      DB_HOST: mysql
      DB_PORT: 3306
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
    ports:
      - "8103:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  # ========== Subject Service ==========
  subject-service:
    build: ./services/subject-service
    environment:
      DB_NAME: subject_db
      DB_USER: subject_user
      DB_PASSWORD: subject_password
      DB_HOST: mysql
      DB_PORT: 3306
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
    ports:
      - "8104:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  # ========== Grade Service ==========
  grade-service:
    build: ./services/grade-service
    environment:
      DB_NAME: grade_db
      DB_USER: grade_user
      DB_PASSWORD: grade_password
      DB_HOST: mysql
      DB_PORT: 3306
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
    ports:
      - "8105:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  # ========== Schedule Service ==========
  schedule-service:
    build: ./services/schedule-service
    environment:
      DB_NAME: schedule_db
      DB_USER: schedule_user
      DB_PASSWORD: schedule_password
      DB_HOST: mysql
      DB_PORT: 3306
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
    ports:
      - "8106:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  # ========== Redis ==========
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend

  # ========== RabbitMQ ==========
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ========== Kong API Gateway (DB-less mode) ==========
  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./docker/kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    networks:
      - backend

  # ========== Frontend ==========
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - kong
    networks:
      - backend

volumes:
  mysql_data:

networks:
  backend:
    driver: bridge
