name: university-platform

services:
  # ========== MySQL (shared for dev) ==========
  mysql:
    image: mysql:8.0
    shm_size: 64m
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 128M
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
      - ./docker/mysql/conf/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always
    networks:
      - backend

  # ========== Auth Service ==========
  auth-service:
    build: ./services/auth-service
    restart: unless-stopped
    environment:
      DB_NAME: auth_db
      DB_USER: auth_user
      DB_PASSWORD: auth_password
      DB_HOST: mysql
      DB_PORT: 3306
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-dev-key}
      JWT_ACCESS_TOKEN_LIFETIME: ${JWT_ACCESS_TOKEN_LIFETIME:-15}
      JWT_REFRESH_TOKEN_LIFETIME: ${JWT_REFRESH_TOKEN_LIFETIME:-7}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8101:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend

  # ========== User Service ==========
  user-service:
    build: ./services/user-service
    restart: unless-stopped
    environment:
      DB_NAME: user_db
      DB_USER: user_user
      DB_PASSWORD: user_password
      DB_HOST: mysql
      DB_PORT: 3306
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      AUTH_SERVICE_URL: http://auth-service:8000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8102:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend

  # ========== Class Service ==========
  class-service:
    build: ./services/class-service
    restart: unless-stopped
    environment:
      DB_NAME: class_db
      DB_USER: class_user
      DB_PASSWORD: class_password
      DB_HOST: mysql
      DB_PORT: 3306
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
    ports:
      - "8103:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  # ========== Subject Service ==========
  subject-service:
    build: ./services/subject-service
    restart: unless-stopped
    environment:
      DB_NAME: subject_db
      DB_USER: subject_user
      DB_PASSWORD: subject_password
      DB_HOST: mysql
      DB_PORT: 3306
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
    ports:
      - "8104:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  # ========== Grade Service ==========
  grade-service:
    build: ./services/grade-service
    restart: unless-stopped
    environment:
      DB_NAME: grade_db
      DB_USER: grade_user
      DB_PASSWORD: grade_password
      DB_HOST: mysql
      DB_PORT: 3306
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
    ports:
      - "8105:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  # ========== Schedule Service ==========
  schedule-service:
    build: ./services/schedule-service
    restart: unless-stopped
    environment:
      DB_NAME: schedule_db
      DB_USER: schedule_user
      DB_PASSWORD: schedule_password
      DB_HOST: mysql
      DB_PORT: 3306
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
    ports:
      - "8106:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  # ========== Redis ==========
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend

  # ========== RabbitMQ ==========
  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ========== Kong API Gateway (DB-less mode) ==========
  kong:
    image: kong:3.6
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./docker/kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    networks:
      - backend

  # ========== Messaging Service ==========
  messaging-service:
    build: ./services/messaging-service
    restart: unless-stopped
    environment:
      DB_NAME: messaging_db
      DB_USER: messaging_user
      DB_PASSWORD: messaging_password
      DB_HOST: mysql
      DB_PORT: 3306
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      AUTH_SERVICE_URL: http://auth-service:8000
      REDIS_URL: redis://redis:6379/1
    ports:
      - "8107:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend

  # ========== Live Service ==========
  live-service:
    build: ./services/live-service
    restart: unless-stopped
    environment:
      DB_NAME: live_db
      DB_USER: live_user
      DB_PASSWORD: live_password
      DB_HOST: mysql
      DB_PORT: 3306
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      AUTH_SERVICE_URL: http://auth-service:8000
      REDIS_URL: redis://redis:6379/2
    ports:
      - "8108:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - backend

  # ========== Complaint Service ==========
  complaint-service:
    build: ./services/complaint-service
    restart: unless-stopped
    environment:
      DB_NAME: complaint_db
      DB_USER: complaint_user
      DB_PASSWORD: complaint_password
      DB_HOST: mysql
      DB_PORT: 3306
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      AUTH_SERVICE_URL: http://auth-service:8000
    ports:
      - "8109:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  # ========== Billing Service ==========
  billing-service:
    build: ./services/billing-service
    restart: unless-stopped
    environment:
      DB_NAME: billing_db
      DB_USER: billing_user
      DB_PASSWORD: billing_password
      DB_HOST: mysql
      DB_PORT: 3306
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      AUTH_SERVICE_URL: http://auth-service:8000
    ports:
      - "8110:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend

  # ========== Frontend ==========
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - kong
    networks:
      - backend

volumes:
  mysql_data:

networks:
  backend:
    driver: bridge
